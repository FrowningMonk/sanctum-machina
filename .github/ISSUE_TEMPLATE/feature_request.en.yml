name: Feature request
description: Idea for a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What you're suggesting
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why
      description: What problem this solves or what use case it enables.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What you've already tried or what workarounds exist.
