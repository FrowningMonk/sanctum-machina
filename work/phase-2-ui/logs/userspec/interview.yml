  - question_num: 6
    timestamp: "2026-04-16 00:15:00"
    topic: "cycle-3: user stories, AC, edge cases + architectural pivot"
    agent_question: |
      Draft user stories US-1..US-7, edge cases + error scenarios (таблица),
      AC обязательные AC-1..17 и желательные AC-18..20, иконка приложения.
    user_answer: |
      US-1 изменён: настройки инференса НЕ на отдельном экране, а кнопкой "Настройки" ВНУТРИ
        ChatScreen (bottom sheet). Применить / Default. Применяется сразу в текущем чате.
      US-2..US-7 — согласовано.
      AC-5 — согласовано (убираем SettingsScreen полностью).
      AC-6 — AboutScreen как отдельный destination, кнопка "О приложении" на начальном экране,
