notes: |
  - Phase 2 strictly excludes Room (Phase 3) and Projects (Phase 4).
  - All chats are quick-mode by default: one ChatScreen, no chat_id, attachments в filesDir/quick/.
  - Challenge: где хранятся per-model user overrides без Room? Вариант: Proto DataStore, key = modelId.
  - Reference device: Honor 200 (12GB RAM). Но architecture.md говорит "8GB+ RAM" как target class —
