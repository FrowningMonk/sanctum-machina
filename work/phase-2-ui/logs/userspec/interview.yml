      2. ResultListener — уже имеет 3-й аргумент partialThinkingResult: String?.
         ChatViewModel Phase 2 накапливает и рендерит thinking collapsible.
      3. **БЛОКЕР:** AllowedModel.toModel() в core-runtime/data/ModelAllowlist.kt не парсит
