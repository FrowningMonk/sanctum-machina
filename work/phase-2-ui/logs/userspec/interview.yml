         инициализируется без vision backend и multimodal не запустится.
      4. Model.configValues (in-memory map) — рендерится через ConfigDialog pattern (порт из Gallery).
         Изменения пишутся в DataStore через :core-settings (override persist per modelId).
      5. Новые Compose-экраны в :app/ui/: chat/ (переработка), modelmanager/ (+ entry в inference settings),
         settings/ (новый), about/ (новый), theme/ (новый — CustomColors pattern).
      6. Новый модуль :core-settings — DataStore-based persistence для inference overrides
