  BOTH CYCLES CLOSED — all required items >= 85%.

  Final locked decisions:
  - Feature size M.
  - CrashReportActivity in :crash process, no Hilt inside :crash.
  - SAF ACTION_CREATE_DOCUMENT; single .txt; no Share Intent.
  - Logcat via ProcessBuilder *:E --pid, dump mode; collected ONLY in
    AboutScreen export path (main process live).
  - Handler writes crash.log synchronously (overwrite, ≤100КБ), starts
    :crash activity, Process.killProcess.
  - Banner persistence: driven by crash.log file + .dismissed flag.
  - Dev-gesture: 7 taps on BuildConfig.VERSION_NAME in AboutFooter →
    AlertDialog → throw RuntimeException() on main thread onClick.
  - No new ErrorLog whitelist components; crash.log is separate channel.
  - Privacy: test-phase, no filtering.
  - Bootstrap-loop: minimal try/catch, no counter.

  Acknowledged limitations documented:
  - Native SIGSEGV (litertlm) may leave no record.
  - Crash before SanctumApplication.onCreate — out of scope.
  - logcat not available in CrashReportActivity path (placeholder in .txt).

