# ============================================================================
# Phase 1: High-Level Feature Understanding
# ============================================================================
# Interview Cycle 1 scope
phase1_feature_overview:

  feature_name:
    score: 95
    status: "complete"
    value: "phase-1-foundation"
    gaps: ""
    required: true

  feature_description:
    score: 95
    status: "complete"
    value: |
      Phase 1 delivers three things:
      (1) Bootstrap the empty repo into a working Gradle project with two modules: :app and :core-runtime, plus libs.versions.toml, .gitignore, git init, master tag.
      (2) Extract Gallery's inference and download core into :core-runtime via copy-paste
          (LlmModelHelper, LlmChatModelHelper, Model/Config/Tasks data classes, DownloadRepository, DownloadWorker with an ~11-line deletion patch removing HF-token header plumbing across 4 files + removing Firebase Analytics call sites + patching the hardcoded MainActivity class reference in DownloadWorker.kt:342), refactor Gallery's `Model.instance: Any?` anti-pattern into `ModelDefinition` + `ModelRuntimeHandle`, and bundle a forked `1_0_11.json` allowlist as an asset (trimmed to only the two Phase 1 models; no GitHub fetch, no Room, no DataStore in Phase 1).
      (3) Build a minimal text-only chat .apk on top of that core: ModelManagerScreen
          (list from allowlist, download, load) and ChatScreen (text input, streamed
          response, in-response metrics footer showing tok/s + TTFT). No history
          persistence, no projects, no multimodality (no CameraX, no MediaRecorder), no
          settings, no theming, no onboarding, no polished UI.
      Not ported: ModelManagerViewModel god-object (1411 lines — we write a thin
      ModelRegistry ~100 lines instead; full refactor deferred to Phase 2), AICore /
      mlkit-genai-prompt runtime path, Firebase / google-services / FCM, all Gallery
      Compose UI, all customtasks (Agent Skills, Mobile Actions, Tiny Garden,
      Prompt Lab, Benchmark). Also not ported: AppAuth / HuggingFace OAuth — we rely on
      `litert-community/*` being ungated and download anonymously.
    gaps: ""
    required: true

  work_type:
    score: 95
    status: "complete"
    value: "feature"
    gaps: ""
    required: true

  user_problem:
    score: 95
    status: "complete"
    value: |
      Before investing 2-3 months into custom UI, persistence, projects, and multimodality,
      prove that Gallery's inference core extracted into a separate gradle module runs on
      the target device (Honor 200) at speed indistinguishable from Gallery itself on
      the same model (Gemma-4-E2B-it, same backend). Phase 1 is strictly a speed-validation
      milestone: if the speed matches Gallery, Variant B (core + our own shell) is
      validated and Phase 2 begins. Architecture of :core-runtime services is secondary —
      anything (ModelRegistry, DownloadService contracts, Hilt module splits) can be
      reworked in Phase 2 without Phase 1 having to get them right.
    gaps: ""
    required: true

  target_users:
    score: 90
    status: "complete"
    value: "Solo developer (the user himself) as first and only audience in Phase 1. Device: Honor 200 (12GB RAM, NPU)."
    gaps: ""
    required: false

  success_criteria:
    score: 95
    status: "complete"
    value: |
      Primary success: on Honor 200, running Gemma-4-E2B-it with the same backend as
      Gallery, the user's subjective experience of response speed in the Phase 1 .apk
      is "about the same" as in Gallery when run back-to-back with a prompt of the
      user's choice. Objectivity aid: each completed assistant response in Phase 1
      shows a compact metrics footer: `TTFT YYYms · NNs total`. No tokens/sec — the
      user rejected inaccurate metrics (we do not have a real tokenizer on hand and
      char/4 heuristic is not trustworthy). The user uses the two numbers to confirm
      the subjective impression, not as a hard automated gate. No formal 3-run protocol
      required — user chooses prompt and runs as many comparisons as they feel
      necessary.

      Secondary success (must also hold for Phase 1 to ship):
      - Model download works end-to-end: remove the currently installed copy, tap
        "Скачать" in ModelManagerScreen, foreground-service notification shows
        progress, file lands in external files dir, "Загрузить" becomes active.
      - Load works: tapping "Загрузить" initializes the engine; subsequent chat turn
        produces a streamed response within a reasonable time (no hang, no OOM).
      - Reset conversation works: within a chat, the user can wipe conversation
        state and start a fresh turn (proves `resetConversation` vs full re-init
        path as per patterns.md).
    gaps: ""
    required: true

  constraints:
    score: 95
    status: "complete"
    value: |
      In scope for Phase 1:
      - Text-only chat (no CameraX, no MediaRecorder, no Content.ImageBytes / AudioBytes in runInference).
      - Single model family: litert-community/gemma-4-E2B-it-litert-lm (anonymous HTTPS download from huggingface.co, no auth).
      - Allowlist as bundled asset (fork of Gallery 1_0_11.json). No network fetch of allowlist.
      - Hardcoded inference settings from allowlist defaults (topK=64, topP=0.95, temp=1.0, maxTokens=4000, accelerator=GPU). No per-model override UI.

      Out of scope for Phase 1 (deferred to later phases):
      - Chat history persistence (no Room in Phase 1, no messages table, no DAO).
      - Projects (no project entity, no shared system prompt, no project files).
      - Multimodality (no image attach, no audio record, no CameraX dependency).
      - Polished UI / theming / dark-mode / onboarding / About screen / manifesto.
      - Settings screen, per-model override UI, log export action.
      - HuggingFace OAuth (AppAuth not added as dependency in Phase 1).
      - AICore / mlkit-genai-prompt runtime path (manifesto — closed-source, not ported).
      - Firebase, google-services, FCM (manifesto — not ported).
      - god-object ModelManagerViewModel refactor (deferred to Phase 2 — Phase 1 writes a
        thin ~100-line ModelRegistry that exposes only download/load/list).
      - Gallery customtasks (Agent Skills, Mobile Actions, Tiny Garden, Prompt Lab,
        Benchmark).

      Hard platform constraint: .apk must install and run on Honor 200 (Android 14+,
      12GB RAM, NPU). Phase 1 does not target emulators.
    gaps: ""
    required: true

  testing_strategy:
    score: 95
    status: "complete"
    value: |
      No automated tests in Phase 1 — neither unit, nor integration, nor instrumentation,
      nor Compose UI. Rationale: Phase 1 is a spike to validate that the core can be
      extracted at Gallery-equivalent speed. Writing tests against a codebase whose
      architecture we reserve the right to rework in Phase 2 would be premature.
      Once Phase 1 ships and we know the real shape of the extracted core and the thin
      registry/services wrapping it, we will decide what to cover. JUnit 5 + MockK
      infrastructure (declared in architecture.md) is not set up until Phase 2.

      Verification in Phase 1 is strictly manual: the user installs the .apk on
      Honor 200, follows the back-to-back speed-compare procedure against Gallery,
      exercises the happy path (download → load → send → stream → reset → send).
      Error scenarios (download failure, init failure, OOM) are observed if they happen
      but are not scripted tests.
    gaps: ""
    required: true

# ============================================================================
# Phase 2: User Experience & Scenarios
# ============================================================================
# Interview Cycle 2 scope (together with Phase 3)
phase2_user_experience:

  user_stories:
    score: 95
    status: "complete"
    value: |
      Primary flow (happy path):
      1. User installs the Phase 1 APK on Honor 200 via adb install or Android Studio.
      2. First launch: runtime permission dialog for POST_NOTIFICATIONS appears — user grants.
      3. App opens on ModelManagerScreen showing a list of models from the bundled
         allowlist (Gemma-4-E2B-it, Gemma-4-E4B-it). All statuses show NOT_DOWNLOADED
         (user removed the Gallery copy before testing).
      4. User taps "Скачать" on Gemma-4-E2B. A foreground notification appears; card
         shows progress bar + received/total MB + transfer speed. Download takes
         ~10-20 min on Wi-Fi for 2.4 GB.
      5. When finished, status flips to SUCCEEDED; button becomes "Загрузить".
      6. User taps "Загрузить". A "Загрузка модели..." indicator shows for 5-20 seconds
         while the LiteRT-LM engine initializes with backend=GPU. Then ChatScreen opens.
      7. ChatScreen: TopAppBar with model name + "Сбросить" icon button. Empty message list.
         Bottom row: text field + send icon. User types a prompt, taps send. Response
         streams token-by-token. Under each assistant message: small footer
         `TTFT YYYms · XXXs total`.
      8. User runs a second turn — conversation persists (multi-turn memory works).
      9. User taps "Сбросить" in TopAppBar — chat history clears in UI, conversation
         state resets in the engine (resetConversation, not full re-initialize). User
         starts a fresh turn.
      10. User presses back — returns to ModelManagerScreen, the engine is cleaned up
         (native memory released).

      Secondary flow (back-to-back speed comparison):
      11. User installs Google AI Edge Gallery (already on phone) side-by-side with
         Phase 1 APK. Both have Gemma-4-E2B-it downloaded (each app stores it under
         its own package-specific externalFilesDir — the downloads do not share).
      12. User runs the same prompt in both apps, eyeballs the streaming speed, and
         compares TTFT + total duration footer between the two.
    gaps: ""
    required: true

  acceptance_criteria:
    score: 95
    status: "complete"
    value: |
      Must pass (hard requirements for Phase 1 to ship):
      AC-1. APK installs cleanly on Honor 200 (Android 14+) and opens MainActivity without crash.
      AC-2. POST_NOTIFICATIONS is requested on first launch (Android 13+) and the app
            continues to function after grant.
      AC-3. ModelManagerScreen lists exactly two models from the bundled allowlist:
            Gemma-4-E2B-it (~2.4 GB) and Gemma-4-E4B-it (~4.3 GB). Each shows name,
            size in MB/GB, and current status.
      AC-4. Download of each model works end-to-end: tap "Скачать" → foreground
            notification appears → progress indicator updates → on completion, status
            flips to SUCCEEDED, file present at
            /sdcard/Android/data/app.sanctum.machina/files/{model}/{commitHash}/{file}.litertlm,
            size matches the allowlist sizeInBytes field.
      AC-5. Download supports resume: user kills the app mid-download, relaunches,
            taps "Скачать" again — download continues from the saved byte offset
            using the .gallerytmp file + HTTP Range header (this flow is inherited
            from Gallery as-is and must still work after extraction).
      AC-6. Download supports cancellation: during IN_PROGRESS, a "Отмена" action
            returns the card to NOT_DOWNLOADED; .gallerytmp is preserved on disk so a
            subsequent download resumes, not restarts from 0.
      AC-7. Model load (engine initialize) works: tap "Загрузить" → "Загрузка модели..."
            shown → within 5-30 seconds ChatScreen opens, no crash, logcat shows no
            native exception. Backend selected is GPU (fallback to CPU only if GPU
            initialization fails).
      AC-8. Single-turn inference: user sends "Hello", receives a non-empty streamed
            response, stream completes with done=true. Metrics footer under the
            message shows TTFT in ms and total generation time in seconds (both
            measured exactly via System.currentTimeMillis — no tok/s, since a
            token-counting heuristic without a real tokenizer would be inaccurate).
      AC-9. Multi-turn inference: three consecutive prompt/reply pairs in the same
            chat. The model demonstrably remembers earlier context in the third
            response. No OOM, no crash. PSS memory usage stays below 4 GB for
            Gemma-4-E2B.
      AC-10. Conversation reset: tapping "Сбросить" in ChatScreen TopAppBar clears
            UI history and calls resetConversation on the LiteRT-LM handle (not full
            re-initialize). Next turn starts fresh with no memory of prior turns,
            but engine load time is NOT repeated.
      AC-11. Stop mid-generation: during a long streaming response, a Stop action
            halts the stream within ~500 ms. The partial response is marked as
            interrupted ("(прервано)" appended). A subsequent turn works normally.
      AC-12. Switch between models: user returns to ModelManagerScreen, taps
            "Загрузить" on the other model. Previous engine unloads (cleanUp); new
            engine loads. No OOM. Both models can be used in the same app session.
      AC-13. Offline inference: after a successful download, with Wi-Fi and mobile
            data OFF, the user can still load the model and run multiple chat turns —
            confirms zero network dependency during inference (manifesto requirement).
      AC-14. Speed parity with Gallery (primary milestone): user's subjective
            experience of streaming speed on Gemma-4-E2B-it, run back-to-back with
            Gallery on the same device using a prompt of user's choice, is "about
            the same". TTFT shown in our footer is not dramatically higher than
            subjective perception of Gallery's TTFT. This is the hard validation
            goal of Phase 1; failing it means Variant B is not working and we stop.

      Nice-to-pass (desired but not blocking):
      AC-15. Corrupted model file: if the user manually overwrites the .litertlm
            with garbage (via adb), "Загрузить" surfaces a readable error message
            in ChatScreen ("Не удалось загрузить модель. Скачайте заново.") + back
            button. No native SIGSEGV visible to the user.
      AC-16. On-device error log at context.filesDir/logs/errors.log contains
            ERROR entries for at least three components: download failed, model
            initialize failed, inference failed. Format per patterns.md
            ("ERROR [component] short description :: cause"). Rotation at 2 MB
            (errors.log.1). Log extraction in Phase 1 is manual via
            `adb pull /sdcard/Android/data/app.sanctum.machina/files/logs/errors.log`
            (or the internal-storage equivalent path). No in-app share-sheet
            export UI in Phase 1 — that is a Phase 2+ concern.
    gaps: ""
    required: true

  edge_cases:
    score: 90
    status: "complete"
    value: |
      - Download interrupted by OS kill of foreground service (low memory, user
        swipe) → .gallerytmp stays in externalFilesDir, WorkManager state is CANCELLED,
        UI rolls back to NOT_DOWNLOADED. On next "Скачать" tap, Range header resumes
        from saved offset. Inherited from Gallery.
      - User taps "Отмена" mid-download → same behavior as above (CANCELLED →
        NOT_DOWNLOADED), .gallerytmp preserved, next tap resumes.
      - Reboot mid-download → .gallerytmp survives, SharedPreferences startTime
        may be stale but resume still works via Range header. In Phase 1 we do NOT
        show "resume?" dialog — user just taps "Скачать" and it resumes silently
        (matching Gallery).
      - Final renameTo(.gallerytmp → .litertlm) returns false → known Gallery bug
        at DownloadWorker.kt:258. In Phase 1 we mark as RISK and do not fix
        (out of scope for Foundation spike).
      - Hardcoded Class.forName("com.google.ai.edge.gallery.MainActivity") in
        DownloadWorker.kt:342 → must be patched before extraction compiles
        (inject the :app Activity class reference, e.g., via BuildConfig constant
        or constructor injection). Part of extraction work, not an error case.
      - No sha256 verification in download → corrupted file presents as
        initialize failure at LlmChatModelHelper (AC-15). Acceptable for Phase 1.
      - Honor 200 does not expose a LiteRT NPU backend → UI must NOT offer NPU as
        an accelerator choice. Hardcoded to GPU with CPU fallback in Phase 1.
      - Engine initialize succeeds but first inference takes longer than expected
        (GPU cold-start, driver warmup). UI shows streaming as soon as first
        chunk arrives — no user-visible timeout in Phase 1.
      - User presses send again while a response is streaming → input field
        disabled during generation (button greyed out). Prevents
        sendMessageAsync race per patterns.md / code-research.md note.
      - User presses Stop during generation → stopResponse called, stream ends
        with done=true, partial text annotated "(прервано)". Next turn works.
      - User presses back during generation → stopResponse is called FIRST, then
        cleanUp — avoids SIGSEGV per code-research.md.
      - User presses back during model initialization (while "Загрузка модели..."
        is shown) → UI immediately returns to ModelManagerScreen. The native
        Engine.initialize call does not expose a cancellation API, so it runs
        to completion in the background, then the registry tears it down via
        cleanUp. If the user taps Load again for the same or another model
        before the orphaned Engine has cleaned up, the registry serializes
        the operations via a coroutine Mutex (implementation detail — tech-spec).
      - Stream stall (LiteRT-LM enters a pathological state with neither
        onMessage nor onError firing) → NOT handled in Phase 1 by design. No
        watchdog. User workarounds: tap Stop; if Stop is ineffective, swipe
        the app from recents. Acceptable for a Foundation spike; revisit if
        actually encountered on Honor 200.
      - Engine cleanUp exceptions (conversation.close or engine.close throwing) →
        logged at ERROR level, swallowed. Not user-visible.
      - Context window overflow (>32K tokens in a very long multi-turn chat) → in
        Phase 1 with no history persistence, unlikely to reach but possible.
        Native LiteRT-LM returns an error via MessageCallback.onError. Surface
        as inline chat error "Не удалось сгенерировать ответ." (same path as any
        other inference error).
    gaps: ""
    required: true

  error_scenarios:
    score: 95
    status: "complete"
    value: |
      Visible failure modes and their UX:
      E1. Download failed (network loss, DNS, TLS, disk full, 404/401/403 —
          shouldn't occur on community repo but possible during HF outage):
          Card status → FAILED. Under model name, red text with errorMessage from
          worker. Primary button becomes "Повторить" (calls download again, resumes
          via .gallerytmp if present). Foreground notification disappears.
          Error logged: ERROR [download] {modelId} :: {exception.message}.
      E2. Model load / initialize failed (file missing, file corrupted, GPU driver,
          OOM):
          ChatScreen opens, shows inline "Не удалось загрузить модель." + the
          cleaned-up message from cleanUpMediapipeTaskErrorMessage. A "Назад к
          списку моделей" button is visible. User returns and re-downloads.
          Error logged: ERROR [inference-init] {modelId} :: {cleanedMessage}.
      E3. Inference failed mid-generation (OOM, native crash, stream stalls,
          context overflow):
          In ChatScreen message list, the streaming assistant message is replaced
          with an inline error entry (red text) + "Повторить" button. Previous
          user messages stay. Conversation state may or may not be recoverable —
          user can reset via TopAppBar icon if things feel broken.
          Error logged: ERROR [inference] {modelId} :: {message}.
      E4. User cancellation (Stop during streaming):
          Not an error. Streaming stops within 500 ms, partial text gets
          "(прервано)" suffix in muted grey. No log entry.
      E5. Cleanup failure (conversation.close / engine.close throws):
          Swallowed, logged at ERROR. Not user-visible. User may observe elevated
          PSS if native leak occurred.
          Error logged: ERROR [inference-cleanup] {modelId} :: {message}.
      E6. Corrupted model file (E2 edge case where user / adb-push broke the .litertlm):
          Same path as E2. AC-15 requires a readable message, not a native SIGSEGV
          visible to user.

      Error log infrastructure (patterns.md mandate carried into Phase 1):
      - File: context.filesDir/logs/errors.log.
      - Format: "ERROR [component] short one-line description :: root cause".
        No multi-line, no emoji, no ornamental dividers. One event = one line.
      - Level: ERROR only. No Log.i/Log.w/Log.d in production code.
      - Rotation: when errors.log > 2 MB, rename to errors.log.1 (overwriting
        any previous .1) and start fresh.
      - Components required to log in Phase 1: download, inference-init, inference,
        inference-cleanup. Deferred to later phases (since infra doesn't exist
        yet): history-load, history-write, attachment-write, attachment-read,
        auth, room-migration.
      - Export UI is NOT in scope for Phase 1. User extracts via `adb pull` or
        logcat if needed.
    gaps: ""
    required: true

  verification_strategy:
    score: 95
    status: "complete"
    value: |
      Note on adaptation of code-research.md §8 smoke-checklist: the checklist
      was written by the code-researcher before the Phase 1 allowlist was
      finalized and references Gemma3-1B-IT as a "small model" target. In
      Phase 1 the allowlist contains only Gemma-4-E2B-it and Gemma-4-E4B-it,
      so substitute Gemma-4-E2B for the "small" model role and Gemma-4-E4B
      for the "big" model role in multi-turn and switch-model tests. The
      14-step pattern itself is valid. code-research.md is a frozen research
      artifact and is not rewritten.

      Agent-side verification (what I can do as the implementation agent):
      - `./gradlew :app:assembleDebug` must BUILD SUCCESSFUL.
      - `./gradlew build` must pass (no detekt/lint hard stops).
      - Static analysis of :core-runtime: grep for `androidx.compose.*` and
        `androidx.activity.*` — must be ZERO hits (module boundary per patterns.md).
      - Search for Firebase / firebase / Analytics / mlkit-genai / AICore / AppAuth /
        google-services in :core-runtime and :app — must be ZERO hits.
      - Search for `Log.i(`, `Log.w(`, `Log.d(` in non-test source — must be
        ZERO hits (ERROR-only mandate).
      - No automated tests in Phase 1 (confirmed in testing_strategy).

      User-side verification (what only the user on Honor 200 can do):
      - Install APK via adb / Android Studio.
      - Run the 14-step smoke checklist documented in work/phase-1-foundation/code-research.md § 8 (steps 1-13 are hard requirements, step 14 is nice-to-have).
      - Run the back-to-back speed compare against Gallery on a prompt of the
        user's choice. Subjective confirmation + TTFT reading from the in-app
        footer.
      - Verify errors.log has entries for E1/E2/E3 where applicable by
        triggering each scenario (disconnect Wi-Fi during download for E1,
        adb-push garbage file for E6/E2, etc.) and running `adb pull` to
        inspect.
    gaps: ""
    required: true

  ui_ux_requirements:
    score: 90
    status: "complete"
    value: |
      Phase 1 UI is deliberately ugly-functional Material 3 — no theming effort,
      no polish, no accent color work, no custom icons, no animations. The Phase 5
      visual identity from ux-guidelines.md does NOT apply yet.

      ModelManagerScreen:
      - Scaffold with TopAppBar "Модели".
      - LazyColumn of Cards, one per model from allowlist.
      - Card layout: model name (headline), size in MB/GB (supporting text),
        status line, primary action button (contextual: Скачать / Отмена /
        Загрузить / Повторить).
      - Status line wording:
        * NOT_DOWNLOADED: no status line shown.
        * IN_PROGRESS: "XX% · NN MB из MM MB" + LinearProgressIndicator below.
        * SUCCEEDED: "Скачано".
        * FAILED: red text "Ошибка: {message}".

      ChatScreen:
      - Scaffold with TopAppBar showing model name (overflow-ellipsized) and
        trailing IconButton (Refresh icon) — "Сбросить" action.
      - Body: LazyColumn of messages. User messages right-aligned, assistant
        messages full-width left-aligned. Plain Text composable — no bubbles,
        no avatars, no markdown rendering in Phase 1 (compose-richtext is a
        Phase 2 dep).
      - Under each completed assistant message, in smaller muted text:
        "TTFT YYYms · NNs total" (no tok/s).
      - Interrupted messages get "(прервано)" suffix in smaller muted text.
      - Error messages in the list: red text, with an inline "Повторить"
        TextButton below.
      - Bottom input bar: OutlinedTextField + trailing IconButton(Send). Input
        disabled while streaming. Send replaced with Stop IconButton during
        streaming.

      Strings:
      - All user-facing text in Russian, in res/values/strings.xml per
        ux-guidelines.md. No inline hardcoded strings.
      - Tone follows ux-guidelines.md even in Phase 1: short, direct, no
        emoji, no "пожалуйста", no "к сожалению".
    gaps: ""
    required: false

  risks:
    score: 90
    status: "complete"
    value: |
      R1. Gallery-derived code contains a hardcoded
          Class.forName("com.google.ai.edge.gallery.MainActivity") in
          DownloadWorker.kt:342. Must be patched; if missed, notification-tap
          crash on first download. Mitigation: patch identified in code-research.md,
          applied during extraction with BuildConfig constant.
      R2. Honor 200 NPU is not supported by LiteRT-LM → hardcoded GPU/CPU only.
          Mitigation: allowlist UI does not expose accelerator selection; engine
          config is fixed to GPU with fallback to CPU if GPU init fails.
      R3. Engine cleanUp during active inference can native-crash (no built-in
          guard). Mitigation: ModelRegistry must call stopResponse() before
          cleanUp() whenever user navigates away mid-generation.
      R4. Gallery's download renameTo (.gallerytmp → .litertlm) has an
          unchecked return value — a silent ValueError under rare filesystem
          conditions, leaving a partially-renamed file. Mitigation: Phase 1
          accepts this risk as-is (explicitly NOT fixing in Foundation); if it
          triggers, initialize fails and user re-downloads. Fix deferred to Phase 2.
      R5. No sha256 verification of downloaded file → corrupted download
          surfaces only as initialize failure. Mitigation: readable error
          message via cleanUpMediapipeTaskErrorMessage + user re-download.
      R6. Compression of TOK/S metric — if we later add tok/s and the heuristic
          is misleading, user loses trust in metrics. Mitigation: ship Phase 1
          with TTFT-only, add tok/s only if LiteRT-LM 0.10.0 exposes a true
          counter in Message stats (to be verified in Phase 2).
      R7. Phase 1 architecture of :core-runtime (ModelRegistry,
          DownloadService, ModelInitService contracts) may need reworking in
          Phase 2. Mitigation: explicitly accepted — Phase 1 is a spike, not
          a finalized architecture. Phase 2 may refactor freely.
      R8. Throwaway UI — Phase 1 Compose code will be deleted in Phase 2.
          Mitigation: deliberately minimal (~250 lines of Compose total) so
          deletion is cheap.
      R9. Gallery upstream may change allowlist 1_0_11.json schema. Mitigation:
          we freeze a forked copy as a bundled asset — no upstream dependency
          at runtime.
    gaps: ""
    required: true

  technical_decisions:
    score: 85
    status: "complete"
    value: |
      D1. Variant B (core + custom shell) confirmed (see work/research/gallery-analysis.md).
      D2. Extract 13 Kotlin files + 1 JSON asset from gallery-source into
          :core-runtime via copy-paste + small patches. Full file list in
          work/phase-1-foundation/code-research.md § 2.
      D3. Patch: remove HF-token plumbing (11 lines across 4 files), remove
          Firebase Analytics calls (in DownloadRepository), patch hardcoded
          MainActivity class reference (inject via BuildConfig).
      D4. Allowlist bundled as asset, not fetched from GitHub. Contains only
          Gemma-4-E2B-it and Gemma-4-E4B-it entries.
      D5. No Room, no Proto DataStore, no AppAuth in Phase 1. State lives in
          memory (StateFlow) + files on disk (model files in externalFilesDir).
      D6. Refactor Model.instance: Any? anti-pattern into ModelDefinition
          (immutable) + ModelRuntimeHandle (mutable), per architecture.md.
          This is the one non-copy-paste refactor in Phase 1 because carrying
          the anti-pattern would block Phase 2 architecture.
      D7. god-object ModelManagerViewModel (1411 lines) is NOT ported. Replaced
          with a thin ModelRegistry in :core-runtime (~100 lines) exposing only
          list + download + load + unload. Full refactor deferred to Phase 2.
      D8. No automated tests. Unit-test infrastructure (JUnit 5 + MockK) from
          architecture.md is introduced in Phase 2.
      D9. Metrics: TTFT + total duration only. No tok/s until a true tokenizer
          counter is available from LiteRT-LM.
      D10. UI is deliberately minimal Material 3, no theming effort. Strings
           in res/values/strings.xml per ux-guidelines.md.
      D11. Error log infrastructure shipped in Phase 1 (context.filesDir/logs/errors.log,
           ERROR-only, rotation at 2 MB) for components: download,
           inference-init, inference, inference-cleanup.
    gaps: ""
    required: false

  deploy_approach:
    score: 90
    status: "complete"
    value: |
      No CI/CD in Phase 1. Build is manual:
      - `./gradlew :app:assembleDebug` from the developer machine.
      - Output APK at app/build/outputs/apk/debug/app-debug.apk.
      - Transfer APK to Honor 200: user installs manually (adb install / Android
        Studio Run / file transfer + package installer). User has confirmed
        "ты делаешь мне apk я руками ставлю его на телефон и делаю все там".
      - No signing keystore required (debug keystore auto-generated).
      - No Play Store, no F-Droid, no GitHub Releases in Phase 1 (per
        deployment.md — GitHub Releases only at Phase 5).
    gaps: ""
    required: false

  manual_user_actions:
    score: 95
    status: "complete"
    value: |
      One-time setup on Honor 200 (if not already done):
      - Enable Developer Mode + USB debugging (or Wireless debugging).
      - Keep Google AI Edge Gallery installed separately for back-to-back
        speed comparison (models do not share between apps — Phase 1 APK
        downloads into its own externalFilesDir).

      Per-release flow:
      - User receives app-debug.apk from the developer machine.
      - User installs on phone (adb install -r OR tap the APK in a file
        manager — package installer handles it).
      - User opens the app.
      - On first launch, grant POST_NOTIFICATIONS when the system dialog appears.
      - User taps "Скачать" on the target model, waits ~10-20 min.
      - User runs the back-to-back speed comparison against Gallery.
      - If bugs found, user reports back; developer iterates; ships new APK.

      No API keys, no service accounts, no credentials, no OAuth in Phase 1.
      No external service setup required.
    gaps: ""
    required: false

# ============================================================================
# Phase 3: Integration & Technical Context
# ============================================================================
# Interview Cycle 2 scope (together with Phase 2)
phase3_integration:

  integration_points:
    score: 90
    status: "complete"
    value: |
      Phase 1 is the foundation layer — no prior Sanctum Machina code exists.
      Integration is with external systems only:
      - HuggingFace CDN (huggingface.co) over anonymous HTTPS for model download.
        Endpoint: https://huggingface.co/litert-community/gemma-4-E2B-it-litert-lm/resolve/{commitHash}/{file}.litertlm
        Same pattern for E4B. No auth.
      - LiteRT-LM native SDK (com.google.ai.edge.litertlm:litertlm-android 0.10.0)
        at runtime — linked as a Maven dependency, ships .so libs inside the APK.
      - Android OS services: WorkManager (foreground download), NotificationManager
        (POST_NOTIFICATIONS permission + foreground notification channel),
        file system (externalFilesDir for model storage, filesDir for logs).
      - No Google AI Edge Gallery integration at runtime. Gallery is a
        read-only source for copy-paste extraction at dev-time, and a
        side-by-side comparison peer at verification-time.
      - Downstream (future): Phase 2 will consume :core-runtime via its thin
        service interfaces (ModelRegistry, download/load APIs) — Phase 1 must
        expose these as interfaces (even if impls are minimal) so Phase 2 can
        wire a proper UI on top without re-plumbing the core.
    gaps: ""
    required: true

  dependencies:
    score: 90
    status: "complete"
    value: |
      Required gradle dependencies for Phase 1 (minimum set from libs.versions.toml
      per architecture.md, filtered to what Phase 1 actually uses):

      :core-runtime:
      - kotlin-stdlib, androidx-core-ktx
      - com.google.ai.edge.litertlm:litertlm-android:0.10.0 (pinned)
      - androidx.work:work-runtime-ktx:2.10.0
      - com.google.code.gson:gson:2.12.1 (allowlist JSON parsing)
      - com.google.dagger:hilt-android:2.57.1 + hilt-compiler via KSP

      :app:
      - Everything :core-runtime depends on (transitively via module dep)
      - androidx.activity-compose, androidx.lifecycle-viewmodel-compose
      - androidx.compose BOM 2026.03.00 + material3, ui, ui-tooling-preview
      - androidx.navigation:navigation-compose (two routes: models, chat)
      - androidx.hilt:hilt-navigation-compose

      Explicitly NOT added in Phase 1:
      - androidx.room:* (no persistence in Phase 1)
      - androidx.datastore:* (no preferences / no settings in Phase 1)
      - net.openid:appauth (no HF OAuth)
      - androidx.camera:* (no multimodality)
      - com.halilibo.compose-richtext (no markdown rendering)
      - com.google.mlkit:genai-prompt (no AICore)
      - com.google.gms:google-services plugin, firebase-* (manifesto)
      - MockK, JUnit 5 (no tests in Phase 1)

      Explicitly NOT ported from Gallery (even though they're in Gallery's deps):
      - play-services-tflite-* (not needed — LiteRT-LM is standalone)
      - androidx.security.crypto (no encrypted DataStore in Phase 1)
      - com.squareup.moshi (we use Gson to match Gallery's ModelAllowlist code)
    gaps: ""
    required: false

  technical_constraints:
    score: 90
    status: "complete"
    value: |
      - compileSdk = 35, targetSdk = 35, minSdk = 31 (matches Gallery).
      - Kotlin 2.2.x, JVM target 11, AGP 8.8.2.
      - :core-runtime has ZERO Compose / Activity / ViewModel imports
        (patterns.md boundary rule — enforced by code review).
      - AndroidManifest.xml requires: INTERNET, ACCESS_NETWORK_STATE,
        FOREGROUND_SERVICE, FOREGROUND_SERVICE_DATA_SYNC, POST_NOTIFICATIONS,
        WAKE_LOCK. Plus <service android:name="androidx.work.impl.foreground.SystemForegroundService"
        android:foregroundServiceType="dataSync" tools:node="merge" />.
      - <uses-native-library libOpenCL.so required="false"> +
        libvndksupport.so required="false" for GPU support.
      - Namespace: app.sanctum.machina (app) and app.sanctum.machina.core
        (core-runtime). applicationId = "app.sanctum.machina".
      - Model files stored at
        context.getExternalFilesDir(null)/{normalizedModelName}/{commitHash}/{modelFile}.
      - Logs at context.filesDir/logs/errors.log.
      - ProGuard/R8 disabled in Phase 1 (isMinifyEnabled = false, debug build only).
      - Target device: Honor 200 (Mediatek Dimensity 9010, Adreno-compatible GPU,
        12 GB RAM, Android 14+). No NPU exposed to LiteRT-LM.
      - Performance target: TTFT and streaming rate on Gemma-4-E2B-it GPU must
        be subjectively equivalent to Gallery on the same device (hard gate).
    gaps: ""
    required: false

  data_requirements:
    score: 85
    status: "complete"
    value: |
      Sources:
      - Bundled allowlist JSON (forked from Gallery's 1_0_11.json, trimmed to
        Gemma-4-E2B-it + Gemma-4-E4B-it entries), stored in
        :core-runtime/src/main/assets/model_allowlist.json.
      - Model files downloaded on demand from HuggingFace, stored in
        externalFilesDir per AC-4 path.

      In-memory / transient:
      - StateFlow<List<ModelState>> in ModelRegistry — built at app start by
        parsing allowlist + scanning externalFilesDir for existing downloads.
      - Conversation state (LiteRT-LM internal) — alive as long as a chat
        session is active. Cleared on resetConversation or cleanUp.
      - Chat messages — in-memory MutableStateFlow<List<ChatMessage>> on
        ChatViewModel. NOT persisted to Room. Lost on process kill. That's the
        whole point: Phase 1 does not add persistence.

      On disk (persistent across restarts):
      - Model files at externalFilesDir (size: 2-5 GB per model).
      - Partial download files (.gallerytmp) at the same location during download.
      - Error log at filesDir/logs/errors.log (max 2 MB + one rotation file).
      - No database, no preferences file, no secrets file, no cache DB.

      No PII, no user accounts, no credentials stored anywhere.
    gaps: ""
    required: false

  migration_needs:
    score: 90
    status: "complete"
    value: |
      No migration concerns for Phase 1:
      - No existing Sanctum Machina install on any device (this is the first
        ever Phase 1 APK, Phase 0 is the empty repo).
      - No database → no schema migrations.
      - No preferences → no key migrations.
      - The coexisting Google AI Edge Gallery install on Honor 200 is entirely
        independent (different applicationId, different externalFilesDir).
        Downloaded models do not transfer between apps — this is expected
        and required for back-to-back comparison.
      - Uninstalling the Phase 1 APK (e.g., to install Phase 2) will wipe
        externalFilesDir → the user must re-download the model for Phase 2.
        Acceptable for Phase 1-2 transition; no user data is lost because
        no chat history is persisted.
    gaps: ""
    required: false

# ============================================================================
# Phase 4: Completion
# ============================================================================
phase4_completion:
  userspec_file: "work/phase-1-foundation/user-spec.md"
  status: "approved"

# ============================================================================
# Decision Rules
# ============================================================================
decision_rules:

  required_threshold: 85
  optional_threshold: 50

  # Stop criteria (BOTH must be true to exit a cycle)
  stop_criteria:
    - "All required items in current cycle scope score >= 85%"
    - "Structural: every required item has non-empty value, no TBD, gaps empty or conscious limitations"

  priority_order:
    - "Required items with score < 85% (lowest score first)"
    - "Optional items mentioned by user in context"
    - "Other optional items if user seems knowledgeable"

  question_strategy:
    - "3-4 questions per batch about different gaps"
    - "Run as many batches as needed — batch size is NOT cycle limit"
    - "Propose solutions based on PK, not just ask questions"
    - "Challenge with substance: counterexamples, code references, unexplored scenarios"
    - "After each response: update scores, values, gaps, conversation_history, save"

# ============================================================================
# Interview Progress
# ============================================================================
progress:
  current_phase: "phase3_completion"  # Cycle 2 complete, heading to completeness check + user-spec draft
  questions_asked: 12
  last_question: "Batch 3 — user flow, allowlist scope, metric choice, UI minimalism, error UX, manual actions"
  total_required_score: 94
  total_optional_score: 90
  completion_estimate: "90%"
  user_detail_level: "detailed"

# ============================================================================
# Notes
# ============================================================================
notes: |
  Free-form notes:
  - Important insights
  - Areas of uncertainty
  - Pivot points
  - Scope changes

# ============================================================================
# USAGE INSTRUCTIONS
# ============================================================================
#
# 1. INIT: Created by init-feature-folder.sh at work/{feature}/logs/userspec/interview.yml
#    Set metadata.started, metadata.status: in_progress
#
# 2. INITIAL SCORING: After user's free-form description, score ALL items
#    Detailed 80-95%, brief 50-70%, vague 20-40%, not mentioned 0%
#
# 3. INTERVIEW LOOP (save after EVERY response):
#    a) Find required items with score < 85% in current cycle scope
#    b) Ask 3-4 questions about different gaps
#    c) Propose solutions based on PK
#    d) User answers
#    e) Update: conversation_history, scores, values, gaps, metadata
#    f) Save immediately
#    g) Check stop criteria (score >= 85% AND structural: value filled, no TBD, gaps resolved)
#    h) Not done → repeat. Done → next cycle.
#
# 4. CYCLES:
#    Cycle 1: phase1_feature_overview items
#    Cycle 2: phase2_user_experience + phase3_integration items
#    Cycle 3: ALL items still below threshold (cleanup pass)
#
# 5. RESUME: If metadata.status is "in_progress"
#    Load, show conversation summary, resume from current state
#
# 6. COMPLETION: After user approves user-spec.md
#    Set phase4_completion.status: approved
#    Set metadata.status: completed
