phase1_feature_overview:

  feature_name:
    score: 100
    status: "complete"
    value: "phase-3-history"
    gaps: ""
    required: true

  feature_description:
    score: 90
    status: "complete"
    value: |
      Phase 3 introduces persistent chat history and restructures the chat-start flow:
      (1) Explicit "Быстрый чат" entry — session-scoped, in-memory only (preserves current Phase 2
          behaviour, makes incognito intent explicit).
      (2) Persistent chats stored in Room — standalone, not tied to a project (chats.project_id nullable
          in Phase 3; Phase 4 will add projects and MAY decide to make it NOT NULL again with a migration).
      (3) Chat-creation flow changes: start screen is minimalist with a central "Новый быстрый чат"
          button; left ModalNavigationDrawer (swipe-right from edge, a-la ChatGPT/Claude) hosts the
          persistent-chat history + "Новый чат" + entry points to Model Manager and About. Tapping any
          entry opens ChatScreen immediately; model load happens in background.
      (4) Engine lifecycle rewrite: Application-scope singleton engine (DefaultModelRegistry becomes
          @Singleton), warmup-on-launch of default/last-used model, optimistic UI so ChatScreen is
          interactive (history visible, scroll, typing) while engine prepares. Cross-model reopen
          surfaces a confirmation dialog BEFORE opening — user can cancel to avoid reinit wait.
      (5) Attachment storage migrates from in-memory Bitmap/PCM to files:
          - filesDir/attachments/{chat_id}/ for persistent chats (paths stored in messages table)
          - filesDir/quick/ for quick chats (purged on session termination)
      (6) Rename + auto-title from first user message; delete chat (swipe-left + long-press) with
          confirmation dialog. Standard ChatGPT/Claude-style affordances.
      (7) Default model selection: global setting "Модель по умолчанию" > last-used fallback > route to
          Model Manager with snackbar when nothing is downloaded.

      Explicit NON-scope additions:
      - One-model-in-memory invariant (cross-model chat requires reinit; dialog-before-open).
      - Phase 2.5 (logging hotfix) ALREADY MERGED to main as v0.2.5-logexport — Phase 3 builds on it.
      - Model-file-on-disk discovery / external storage — deferred (Phase 3 if time permits, else later).

      Follow-up scope additions confirmed (from NOTES.md 2026-04-19):
      (8) Error-logging wrap around model initialization. Wrap LlmChatModelHelper.initialize (or the
          ChatViewModel callback around it) in try/catch → ErrorLog.e("model", ...). Extend
          ALLOWED_COMPONENTS with "model". Optionally surface a Snackbar with the error code so
          users see something other than a black screen when init fails silently. Driver: realme
          RMX3085 tester got a black screen with zero log entries — Google's litertlm init is
          silent, current Phase 2.5 export shows no trace.
      (9) Keyboard Send-button UX. Apply imePadding / WindowInsets.ime to the MultimodalInputBar
          container so the Send button stays visible above the IME. Small, lands with the
          ChatScreen restructure that Phase 3 is doing anyway.
      (10) DeviceInfoCollector real-data wiring. Replace the stubs that emit "active model: none"
           and "downloaded models: (none)" with real reads from the ModelRegistry (which Phase 3
           extends with an activeModelName accessor for cross-model dialog). Closes a Phase 2.5
           follow-up and instantly improves diagnostic exports for testers.
    gaps: ""
    required: true

  work_type:
    score: 100
    status: "complete"
    value: "feature"
    gaps: ""
    required: true

  user_problem:
    score: 90
    status: "complete"
    value: |
      Sanctum Machina at Phase-2 state is a demo, not a daily driver. Two compounding problems:
      (1) No history — every dialog lives one session; process death or casual swipe-away erases everything;
          yesterday's context is gone every morning.
      (2) Init latency — 20-30s warmup on every app reopen blocks the first message. On a phone, where
          usage is bursty (glance, type, dismiss), this is the dominant pain — more painful than history
          loss itself. The mental cost of "wait half a minute before I can even type" pushes the user
          back to ChatGPT/Claude for daily work, even though on-device privacy is the manifesto.
      The phase must solve both, with init latency taking priority in design decisions when they conflict.
    gaps: ""
    required: true

  target_users:
    score: 85
    status: "complete"
    value: |
      Primary: solo developer himself (see project.md). Phase 3 is THE phase that turns Sanctum Machina
      into his daily driver — the phase-closing success criterion is "I actually use this instead of
      ChatGPT/Claude for a full work day without it annoying me."
      Secondary (post-Phase-5): privacy-conscious users wanting fully-local LLM. They benefit from
      everything built here but are not the primary audience for Phase 3.
      Tertiary (current): friend-testers helping validate the APK — their needs (model-on-disk survival
      across reinstall, error-log export) are being addressed in a parallel Phase 2.5 release, not here.
    gaps: ""
    required: false

  success_criteria:
    score: 90
    status: "complete"
    value: |
      (SC-1) Persistence: close app → reopen → last chat (or any persistent chat) opens showing full
             history. Rendering the chat list and a chat body must not block on engine warmup.
      (SC-2) Zero-warmup same-model switch: if two persistent chats use the currently-loaded model,
             switching between them is instant (no reinit, no delay).
      (SC-3) Background warmup on cross-model switch: opening a persistent chat whose model_id differs
             from the currently-loaded model shows the chat history immediately; warmup of the required
             model runs in background; Send is gated until warmup completes; user may still read / scroll /
             type during warmup.
      (SC-4) Quick chat incognito invariant: after leaving the quick-chat screen OR process kill,
             filesDir/quick/ is empty, no Room rows exist for that session.
      (SC-5) Regression-free: multimodality / streaming / thinking / settings sheet from Phase 2 continue
             to work unchanged on the final APK.
      (SC-6) Init latency is no longer perceived as blocking: the user can open a chat, see history,
             scroll, type — all before warmup completes. First message only waits if warmup is still
             in progress at Send time.
    gaps: ""
    required: true

  constraints:
    score: 90
    status: "complete"
    value: |
      Out of scope for Phase 3:
        - Projects entity + UI (Phase 4)
        - RAG / project files (Phase 4)
        - Foreground service keep-alive (UX-hostile, ruled out)
        - Model switching mid-chat (deferred per patterns.md business rules)
        - Cloud sync / account system (manifesto)
        - Export / import history as .json (post-MVP, likely Phase 5)
        - Search across chats (post-MVP, small chat count for now)
        - Selective message deletion (delete single message from context — post-MVP)
        - Multi-select / batch delete of chats (post-MVP)
      In scope (UX features attached to persistence):
        - Rename chat (UI action, persisted in Room)
        - Auto-title from first user message (like ChatGPT/Claude)
        - Delete chat — OBLIGATORY per user, with confirmation dialog
      Architectural constraints:
        - Room 2.7.x, SQLite single DB sanctum.db
        - Attachments as files in filesDir/attachments/{chat_id}/ (persistent) and filesDir/quick/ (quick)
        - DAOs: suspend/Flow only
        - Schema JSON exported to app/schemas/ + committed to git
        - Instrumented migration tests required (Room convention)
        - Context window truncation: hard-cut oldest-first for MVP (patterns.md business rule)
        - No mid-chat model switch (chat bound to one model_id for lifetime)
    gaps: ""
    required: true

  testing_strategy:
    score: 90
    status: "complete"
    value: |
      - Unit (:app/src/test/ + :core-runtime/src/test/): ChatRepository wrappers with mock DAOs;
        EngineCoordinator (singleton engine lifecycle, warmup, cross-model reinit gating); classifier
        logic; new helpers. Robolectric where Android context required (same pattern as Phase 2).
      - Instrumented DAO tests (:app/src/androidTest/, runs via ./gradlew :app:connectedAndroidTest on
        connected Honor 200): one test per DAO covering insert/query/update/delete; FK cascade test
        for messages.chat_id ON DELETE CASCADE; Flow emission test to confirm observeAll() re-emits
        on write. User has confirmed willingness to connect the phone for these tests.
      - Schema JSON export (Room convention): app/schemas/{dbName}/1.json committed to git in v0.3-history.
      - No Compose UI tests (precedent set in Phase 2: UI verified via manual smoke).
      - No E2E inference in CI (no model in CI).
      - Manual smoke checklist on Honor 200 specific to Phase 3:
        persistent chat survives kill; two chats on same model switch instantly; cross-model dialog;
        delete + rename + auto-title; quick-chat invariant (filesDir/quick/ empty after close);
        regression of Phase 2 features (multimodal, thinking, settings).
    gaps: ""
    required: true

