           история пустая, warmup default-модели уже идёт в фоне → как только engine ready, Send
           активен → шлём → стрим. На Back / swipe-away: сессия и filesDir/quick/ стираются.
      US-2 Новый persistent чат: drawer → "Новый чат" → Room INSERT пустого чата → ChatScreen(chatId)
           → первое сообщение → после done=true ассистента → auto-title из первых 20 символов USER.
      US-3 Открытие старого чата с warm моделью: drawer → тап, model_id == активная → мгновенно,
           история из Room, Send доступен.
      US-4 Открытие старого чата с другой моделью: drawer → тап, model_id != активная → диалог
           "Переключить модель?" → OK → navigate → история видна сразу, reinit в фоне, Send disabled
           до готовности.
      US-5 Продолжить разговор после перезапуска: запустил → main screen → onCreate warmup в фоне →
           открываю drawer → вчерашний чат → история сразу → пишу "продолжим" → стрим.
      US-6 Переименовать чат: long-press → "Переименовать" → диалог с TextField → сохранить.
      US-7 Удалить чат: swipe-left → "Удалить" → диалог с названием и N сообщений → Удалить →
           CASCADE DELETE + deleteRecursively attachments/{chatId}/ → Snackbar.
      US-8 Первый запуск без моделей: main screen = placeholder "Скачайте модель" + кнопка Model
           Manager → скачиваю → становится default → main screen обычный.
      US-9 Сбой инициализации (realme): init-ошибка → try/catch → ErrorLog.e("model", ...) →
           Snackbar с кодом вместо чёрного экрана → в экспорте диагностики видна запись.
      US-10 Экспорт диагностики: "О программе" → "Сохранить лог" → .txt с реальными active model
            и downloaded list (не stubbed).
      US-11 Send с открытой клавиатурой: печатаю → IME поднимает content → Send виден над клавиатурой.
