  edge_cases:
    score: 95
    status: "complete"
    value: |
      - Same-model session: multiple chats open back-to-back → engine warmed once, subsequent
        opens instant (covered by onCleared fix).
      - Cross-model open: dialog before navigation; cancel stays in drawer.
      - Process kill mid-stream: USER persisted, ASSISTANT discarded.
      - Process kill mid cross-model reinit: no special handling — next onCreate warms default,
        user re-confirms cross-model on next tap. No Room writes happen in that window.
      - Delete while streaming to the same chat: stop + CASCADE delete + popBackStack + Snackbar;
        late onMessage ignored.
      - Model file removed externally: dialog "Модель недоступна — [Отмена] [Скачать]", routes
        to Model Manager with model pre-selected.
      - Warmup GPU+CPU both fail: ChatScreen opens with disabled Send + red "Модель недоступна"
        in TopAppBar + Snackbar + ErrorLog.e("engine-warmup", ...). User retries via Model Manager.
      - First run without any model: main screen placeholder + drawer Новый чат disabled.
      - Rotation during streaming: VM survives, Room observes unchanged, streaming StateFlow
        unaffected.
      - Very first chat in app: onCreate completed, warmup ongoing → user lands on main, taps
        New chat before warmup done → ChatScreen opens, Send disabled, warmup finishes, Send
        enables.
    gaps: ""
    required: true

  error_scenarios:
    score: 95
    status: "complete"
    value: |
      GENERAL RULE (from 2026-04-20 user feedback): every failure surface in Phase 3 code MUST
      call ErrorLog.e(component, description, cause) so that Phase 2.5's LogExportManager picks
      up the event in errors.log. This is enforced by existing runtime whitelist + code-review.

      Specific handlers:
      - LlmChatModelHelper.initialize silent failure → ErrorLog.e("model", ...) + Snackbar with
        error code (AC-D2, AC-D3).
      - Application-level warmup failure → ErrorLog.e("engine-warmup", ...); surfaced on next
        chat open attempt.
      - Room DAO read failure → ErrorLog.e("history-read", ...); drawer shows "Не удалось
        загрузить историю" placeholder; other navigation still works.
      - Room DAO write failure → ErrorLog.e("history-write", ...); Snackbar "Не удалось
        сохранить сообщение"; user decides whether to retry or discard.
      - Attachment save failure (IOException writing to filesDir/attachments/) →
        ErrorLog.e("attachment-save", ...); Snackbar; Send either blocked or proceeds text-only
        (TBD — asking in next batch).
      - Attachment read failure on chat reopen (file deleted / corrupt) →
        ErrorLog.e("attachment-read", ...); bubble shows placeholder "Вложение недоступно".
      - Model file missing → non-fatal dialog, no ErrorLog entry (expected user-facing state).
      - Cross-model reinit cleanup() failure → same as heavy reinit in Phase 2 (already logged).
      - Disk full on attachment save: ATOMIC — no Room write, no partial state; Snackbar
        "Недостаточно места"; _attachments preserved for retry after user frees space.
        ErrorLog.e("attachment-save", "disk full", cause).
      - Room open failure at startup (corrupt file, schema mismatch): rename DB to
        sanctum.db.corrupt_{timestamp}, create fresh empty DB, log ErrorLog.e("history-read",
        "db open failed — renamed, new empty created", cause). One-time banner on main screen:
        "Прошлая история оказалась повреждена. Старая база сохранена." + [Сохранить лог] +
        [Закрыть]. "Сохранить лог" reuses the Phase 2.5 SAF flow. Banner state dismissed per-session.
      - No manual "Unload model" action in Phase 3: to free RAM the user closes the app
        (swipe-away / system-kill). Cross-model dialog still handles the 95% scenario.
    gaps: ""
    required: true

  error_scenarios:
