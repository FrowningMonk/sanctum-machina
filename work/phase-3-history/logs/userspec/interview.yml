      AC-E6 ChatViewModel.onCleared НЕ вызывает registry.cleanup.

      Room / storage:
      AC-R1 USER сообщение пишется в Room синхронно до вызова движка.
      AC-R2 ASSISTANT сообщение пишется в Room только на done=true (не по токенам).
