  acceptance_criteria:
    score: 75
    status: "partial"
    value: |
      Persistence + navigation:
      AC-P1 Закрытие приложения (swipe-away) и последующий запуск сохраняют persistent-чаты с
            полной историей.
      AC-P2 Quick chat не оставляет следов: filesDir/quick/ пуст, Room rows отсутствуют.
      AC-P3 Drawer открывается свайпом и тапом hamburger; сортировка по last_message_at DESC.
      AC-P4 Start destination = home hub (не Model Manager).
      AC-P5 Route "chat/{chatId}" работает для persistent; quick chat имеет отдельный маршрут.

      Engine / warmup:
      AC-E1 SanctumApplication.onCreate запускает warmup default-модели после CrashHandler install
