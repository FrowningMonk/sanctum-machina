      AC-E2 Переход между двумя persistent-чатами на активной модели — без reinit (мгновенно).
      AC-E3 При переходе на чат с model_id != активной — показывается диалог "Переключить модель?"
            до навигации.
      AC-E4 ChatScreen открывается мгновенно даже пока engine не готов; Send disabled; текст можно
